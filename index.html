<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scotland Yard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Scotland Yard</h1>

    <div id="start-screen">
        <h2>Multiplayer</h2>
        <div class="start-options">
            <button id="create-game-btn">Create New Game</button>
            <hr>
            <input type="text" id="room-code-input" placeholder="Enter Room Code">
            <button id="join-game-btn">Join Game</button>
        </div>
        <div id="room-info" style="display: none;">
            <p>Share this room code with other players:</p>
            <strong id="room-code-display"></strong>
        </div>
    </div>

    <div id="game-container" style="display: none;">
        <svg id="game-board" width="800" height="600"></svg>
        <div id="ui-sidebar">
            <h2>Game Info</h2>
            <div id="player-info"></div>
            <div id="turn-indicator"></div>
            <div id="action-buttons">
                <button id="confirm-move-btn" disabled>Confirm Move</button>
            </div>
            <div id="mrx-info">
                <h3>Mr. X's Log</h3>
                <div id="mr-x-log"></div>
            </div>
        </div>
    </div>
    <script src="state.js"></script>
    <script src="board.js"></script>
    <script src="game.js"></script>
    <script src="network.js"></script>
</body>
</html>

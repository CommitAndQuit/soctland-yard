<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scotland Yard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Scotland Yard</h1>
    <div id="game-board">
        <svg id="connections" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;">
        </svg>
        <div id="stations-container"></div>

    </div>
    <script src="game-data.js"></script>
    <script src="engine.js"></script>
    <script src="ui.js"></script>
    <script src="script.js"></script>
    <div id="game-info">
        <h2>Game Info</h2>
        <p>Current Turn: <span id="current-turn">1</span></p>
        <p>Current Player: <span id="current-player"></span></p>
        <div id="player-info-container">
            <!-- Player info will be generated here -->
        </div>
        <button id="new-game-btn">New Game</button>
        <button id="double-move-btn" style="display: none;">Use Double Move</button>
    </div>
    <div id="turn-overlay" class="hidden">
        <div id="turn-message">
            <h2 id="overlay-title">Player's Turn</h2>
            <p>Please pass the device to <strong id="overlay-player-name"></strong>.</p>
            <p id="overlay-instruction"></p>
            <button id="ready-btn">I'm Ready</button>
        </div>
    </div>
</body>
</html>

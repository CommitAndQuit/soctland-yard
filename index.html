<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scotland Yard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Scotland Yard</h1>
    <div id="game-board">
        <svg id="connections" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;">
            <line x1="120" y1="120" x2="220" y2="70" stroke="orange" stroke-width="2"/>
            <line x1="120" y1="120" x2="170" y2="220" stroke="orange" stroke-width="2"/>
            <line x1="220" y1="70" x2="320" y2="120" stroke="orange" stroke-width="2"/>
            <line x1="220" y1="70" x2="170" y2="220" stroke="orange" stroke-width="2"/>
            <line x1="320" y1="120" x2="270" y2="220" stroke="orange" stroke-width="2"/>
            <line x1="170" y1="220" x2="270" y2="220" stroke="orange" stroke-width="2"/>
        </svg>
        <div class="location" id="loc-1" style="top: 100px; left: 100px;">1</div>
        <div class="location" id="loc-2" style="top: 50px; left: 200px;">2</div>
        <div class="location" id="loc-3" style="top: 100px; left: 300px;">3</div>
        <div class="location" id="loc-4" style="top: 200px; left: 150px;">4</div>
        <div class="location" id="loc-5" style="top: 200px; left: 250px;">5</div>

        <div class="player detective" id="detective-1"></div>
        <div class="player mr-x" id="mr-x"></div>
    </div>
    <script src="script.js"></script>
    <div id="game-info">
        <h2>Game Info</h2>
        <p>Current Turn: <span id="current-turn">1</span></p>
        <p>Current Player: <span id="current-player">Detective</span></p>
        <div id="player-info">
            <div id="detective-info">
                <h3>Detective</h3>
                <p>Taxi Tickets: <span id="detective-taxi">10</span></p>
            </div>
            <div id="mrx-info">
                <h3>Mr. X</h3>
                <p>Taxi Tickets: <span id="mrx-taxi">4</span></p>
            </div>
        </div>
        <button id="new-game-btn">New Game</button>
    </div>
</body>
</html>
